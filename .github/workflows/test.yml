name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: 
          - windows-latest
          - windows-11-arm
          - macos-13
          - macos-15
          - ubuntu-latest
          - ubuntu-24.04-arm
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        exclude:
          - os: windows-11-arm
            python-version: '3.10'
          - os: windows-11-arm
            python-version: '3.11'
          - os: windows-11-arm
            python-version: '3.12'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '${{ matrix.python-version }}'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run pytest
        run: pytest
